<!doctype html>
<html lang="en" data-platform="shared">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>INTEMO</title>
<link rel="stylesheet" href="ui.css">
</head>
<body class="extension-popup">
<div class="wrap">

  <!-- Brand bar -->
  <div class="brand">
    <div class="brand-mark" aria-hidden="true">
      <!-- INTEMO checkmark-motion mark -->
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M3.5 9.5L7 13L14.5 5.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M7.5 9.5L11 13" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="brand-copy">
      <div class="brand-name">INTEMO</div>
      <div class="brand-sub" id="platform">AI Email Security</div>
    </div>
    <button type="button" id="refresh" class="brand-refresh" title="Refresh status" aria-label="Refresh status">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
        <path d="M11 2.5A5.5 5.5 0 1 0 12 6.5"/>
        <path d="M9 1l2 1.5-1.5 2"/>
      </svg>
    </button>
  </div>

  <!-- Service status -->
  <div class="card status-card">
    <div class="status-icon" id="statusIcon" aria-hidden="true">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
        <path d="M2 8.5A5.5 5.5 0 1 1 8.5 14"/>
        <path d="M2 5v3.5H5.5"/>
      </svg>
    </div>
    <div class="status-body">
      <div class="status-title" id="statusText">Connecting…</div>
      <div class="status-sub"  id="originText">Discovering local API</div>
    </div>
    <div class="status-dot pending" id="statusDot" aria-hidden="true"></div>
  </div>

  <!-- KPI row -->
  <div class="card kpi-row" aria-label="Quick statistics">
    <div class="kpi-cell">
      <span class="kpi-val" id="statScam">—</span>
      <span class="kpi-lbl">Scams</span>
    </div>
    <div class="kpi-cell">
      <span class="kpi-val" id="statSuspicious">—</span>
      <span class="kpi-lbl">Suspect</span>
    </div>
    <div class="kpi-cell">
      <span class="kpi-val" id="statTotal">—</span>
      <span class="kpi-lbl">Emails</span>
    </div>
    <div class="kpi-cell">
      <span class="kpi-val" id="statProviders">—</span>
      <span class="kpi-lbl">Accounts</span>
    </div>
  </div>

  <!-- Quick toggles -->
  <div class="card toggles-card">
    <div class="toggle-row">
      <span class="toggle-label">Auto-classify</span>
      <button type="button" class="toggle-switch active" id="toggleClassify" role="switch" aria-checked="true" aria-label="Auto classify emails"></button>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Threat badges</span>
      <button type="button" class="toggle-switch active" id="toggleBadges" role="switch" aria-checked="true" aria-label="Show threat badges"></button>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Alerts</span>
      <button type="button" class="toggle-switch active" id="toggleThreat" role="switch" aria-checked="true" aria-label="Enable threat alerts"></button>
    </div>
  </div>

  <!-- Recent threats (hidden until threats exist) -->
  <div class="card card-body hidden" id="threatSection">
    <div class="section-head">
      <span class="section-label">Recent threats</span>
      <span class="count-chip" id="threatCount">0</span>
    </div>
    <div id="threatList" class="threat-list" role="list" aria-live="polite" aria-label="Recent threats"></div>
  </div>

  <!-- Domain quick-check -->
  <div class="card card-body">
    <div class="domain-row">
      <input id="domainInput" class="domain-input" type="text" placeholder="Check a domain…"
        autocomplete="off" spellcheck="false" aria-label="Check a domain for threats">
      <button type="button" id="domainCheck" class="btn-secondary btn-sm">Check</button>
    </div>
    <div id="domainResult" class="domain-result hidden" aria-live="polite"></div>
  </div>

  <!-- Primary actions -->
  <div class="actions">
    <button type="button" id="openDashboard" class="btn-primary">Dashboard</button>
    <button type="button" id="openSecurity"  class="btn-secondary">Security</button>
    <button type="button" id="openSettings"  class="btn-secondary">Settings</button>
  </div>

  <div class="ext-footer">INTEMO v<span id="extVersion">14.0.1B</span></div>

</div>
<script src="secure_message_bridge.js"></script>
<script src="extension_runtime.js"></script>
<script src="popup.js"></script>
</body>
</html>
