<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://appsforoffice.microsoft.com; style-src 'self' ; connect-src 'self' http://127.0.0.1:* http://localhost:*; img-src 'self' data:; base-uri 'none'"><title>INTEMO | Email Organizer</title><script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script><link rel="stylesheet" href="taskpane.css"></head><body><header class="hero"><div class="brand"><div class="logo" aria-hidden="true">AI</div><div><h1>Email Organizer</h1><p>INTEMO enterprise assistant</p></div></div><div class="status"><div class="status-dot checking" id="statusDot" aria-hidden="true"></div><span id="statusText">Connecting…</span></div></header><main class="panel"><section class="card"><div class="panel-title">Current email</div><div id="currentEmail" aria-live="polite"><div class="empty-state">Select an email to classify</div></div></section><section class="card hidden" id="classificationPanel"><div class="panel-title">Classification</div><div id="classificationResult" aria-live="polite"><div class="loading">Analyzing…</div></div><div class="actions"><button type="button" class="action-btn primary" id="moveBtn">Move to folder</button><button type="button" class="action-btn" id="changeCategoryBtn">Change</button></div><select class="category-select hidden" id="categorySelect" aria-label="Select category"><option value="">Select category</option><option>Finance</option><option>OTP</option><option>Clients</option><option>Personal</option><option>Promotions</option><option>Spam</option><option>Newsletters</option><option>Security</option></select></section><section class="card"><div class="panel-title">Fast suggestions</div><div class="suggestions" id="suggestions"><span class="suggestion-tag" role="button" tabindex="0" data-category="Finance">Finance</span><span class="suggestion-tag" role="button" tabindex="0" data-category="Clients">Clients</span><span class="suggestion-tag" role="button" tabindex="0" data-category="Security">Security</span><span class="suggestion-tag" role="button" tabindex="0" data-category="Newsletters">Newsletters</span></div></section><section class="card"><div class="panel-title">Recent classifications</div><div class="history" id="history"><div class="empty-state">No recent classifications</div></div></section></main><script src="taskpane.js"></script></body></html>
