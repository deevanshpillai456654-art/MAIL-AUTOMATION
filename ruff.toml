# Ruff configuration for the AI36 backend.
# Aligned with the team's prior bandit `# nosec` annotations so that
# both linters agree on the same set of accepted exceptions.

line-length = 120
target-version = "py312"

# Backend-only — the audit prompts excluded frontend explicitly.
extend-exclude = [
    ".venv",
    "platform/ai-automation/frontend",
    "platform/connectors-panel/frontend",
    "platform/sdk",
    "platform/ai-automation/sdk",
    "platform/connectors-panel/sdk",
    "tests/test_frontend_production_polish.py",
    "tests/test_dashboard_visual_smoke.py",
    "tests/test_extension_packaging.py",
]

[lint]
# Security (S), likely-bug (B), correctness (E,F,W), import order (I).
# Skip SIM/RUF style nits — high noise, low signal for this audit pass.
select = ["S", "B", "E", "F", "W", "I"]

# False positives already reviewed by bandit nosec annotations,
# or patterns the team has accepted across the codebase.
ignore = [
    # ── Security false positives already triaged via bandit ───────────────
    "S104",  # bind 0.0.0.0 — intentional in 4 sites; bandit nosec B104 docs review
    "S311",  # non-crypto random — used for UUIDs/jitter, never for security
    "S112",  # try/except/continue — retry loops where continue is correct
    "S110",  # try/except/pass — fallback paths (legitimate degradation)
    "S608",  # hardcoded SQL f-strings — column-list interpolation; user values
             # always go through ? placeholders (verified across 235 sites)
    "S105",  # hardcoded-password-string — matches identifier names with
             # "password"/"token" substring; no real credentials in the code
    "S106",  # hardcoded-password-func-arg — false positives on token_scopes="[]"
    "S101",  # assert in production — used for invariants the team accepts
    "S603",  # subprocess without shell=True — list-style calls are safe
    "S607",  # start-process-with-partial-path — nslookup via PATH, accepted
    "S310",  # urlopen — all sites are scheme-validated or have nosec
    # ── Style choices the team has implicitly accepted ────────────────────
    "E501",  # long lines — line-length=120 already enforced
    "E701",  # multiple statements on one line with colon (legacy SQL ifs)
    "E702",  # multiple statements on one line with semicolon (param packing)
    "E402",  # module-import-not-at-top — sys.path manipulation requires it
    "E741",  # ambiguous variable name (e, l, I etc — common math/iter names)
    "W291",  # trailing whitespace — remaining ones are inside SQL strings
    "W293",  # blank line with whitespace — same as W291
    "B008",  # function call in arg default — FastAPI Depends/Query REQUIRE this
    "B904",  # raise from — intentionally not chaining to avoid leak
    "B905",  # zip without strict= — Python 3.10+ idiom, optional
    "B007",  # unused loop control variable — common with for/range patterns
    "F841",  # unused-variable — many sites are intentional (db = get_db() for
             # side effects, placeholder assignments); needs case-by-case review
             # rather than a blanket pass
]

[lint.per-file-ignores]
# Test files are free to use `assert` (S101) and crypto-weak random (S311).
"tests/**/*.py" = ["S101", "S311", "S105", "S106"]
# Schema files / scripts may run subprocesses with computed paths.
"scripts/**/*.py" = ["S603", "S607"]
# __init__.py files commonly import for re-export without explicit __all__.
"**/__init__.py" = ["F401"]
