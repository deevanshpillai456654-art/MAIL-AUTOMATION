<!doctype html>
<html lang="en" data-theme="light">
<head>

  <meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="refresh" content="0; url=/dashboard#admin">
  <title>INTEMO | Admin Console</title>
  <style>

</head>

  <main class="card">
    <h1>Opening Admin</h1>

  <script>window.location.replace('/dashboard#admin');</script>

</html>
